<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarte Certo</title>
    <link rel="stylesheet" href="/assets/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>


<body class="descarte-body">
    <a href="login.html" class="voltar-link">
        <i class="fa-solid fa-arrow-left"></i> Voltar
    </a>
    <div class="descarte-signup-container">
        <h2 class="descarte-signup-title">Junte-se ao movimento</h2>
        <form class="descarte-signup-form">
            <div class="descarte-signup-form-group">
                <label class="descarte-signup-label" for="fullname">Usuario:</label>
                <input class="descarte-signup-input" type="text" id="username" name="username" required placeholder="Digite seu nome">
            </div>
            <div class="descarte-signup-form-group">
                <label class="descarte-signup-label" for="email">Email:</label>
                <input class="descarte-signup-input" type="email" id="email" name="email" required placeholder="Digite seu email">
            </div>
            <div class="descarte-signup-form-group">
                <label class="descarte-signup-label" for="password">Senha:</label>
                <input class="descarte-signup-input" type="password" id="password" name="password" required placeholder="Digite sua senha">
            </div>
            <div class="descarte-signup-form-group">
                <button class="descarte-signup-button" type="submit" onclick="alerta()">Cadastrar</button>
            </div>
        </form>
    </div>
</body>


</html>

<script>
    document.querySelector(".descarte-signup-form").addEventListener("submit", async function (e) {
        e.preventDefault(); // sempre bloqueia envio padrão

        const username = document.getElementById("username").value;
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
            const response = await fetch("https://descartecerto.azurewebsites.net/api/Auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: password
                })
            });

            if (response.ok) {
                alert("Conta criada com sucesso!");
                window.location.href = "/login/login.html"; // redireciona pro login
            } else {
                const error = await response.json();
                alert(error.message || "Erro ao criar conta.");
            }
        } catch (err) {
            console.error("Erro:", err);
            alert("Erro de conexão com o servidor.");
        }
    });
</script>
