<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Descarte Certo</title>
  <link rel="stylesheet" href="/assets/css/login.css" />
  <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="forgot">
  <section class="forgotpasswordcontainer">
    <div class="container-forgot">
      <i class="fa-solid fa-key fa-3x"></i>
      <h3>Esqueceu sua senha?</h3>
      <p>Não se preocupe, nós te enviaremos instruções para resetar sua senha.</p>
    
      <form class="form-forgot" autocomplete="on" novalidate>
        <div class="boxinput">
          <label for="email">Email:</label>
          <div class="input-container">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email"
              placeholder="Digite seu email"
              required
              aria-label="Digite seu email"
            />
          </div>
        </div>
        <button type="submit">Clique aqui para receber seu email</button>
        <div id="mensagem-status" hidden></div>
        <a href="/login/login.html" class="backlink"
          ><i class="fa-solid fa-arrow-left"></i> Voltar</a
        >
      </form>
    </div>
  </section>

</body>
<script src="/assets/js/login.js"></script>
</html>
