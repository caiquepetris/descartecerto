<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarte Certo</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/header.css">
    <link rel="stylesheet" href="./assets/css/footer.css">
    <link rel="stylesheet" href="./assets/css/blog.css">
    <link rel="stylesheet" href="./assets/css/rec.css">
    <link rel="stylesheet" href="./assets/css/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="overlay"></div>

    <header>
        <section>
            <div class="container">
                <div class="header-top">
                    <h1><a href="index.html" style="text-decoration: none; color: black;">Descarte Certo</a></h1>

                    <div class="header-actions">
                        <!-- Exibição do usuário logado -->
                        <span id="userDisplay" class="header-user" style="margin-right:12px; display:none;"></span>
                        <!-- Botão de sair -->
                        <button id="logoutBtn" class="header-logout" type="button" style="display:none;">Sair</button>

                        <!-- Botão/Login padrão (será escondido se estiver logado) -->
                        <a href="./login/login.html" class="header-section__login-button" role="button">
                            <svg class="header-section__login-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                                <circle cx="12" cy="7" r="4" />
                            </svg>
                            <span class="header-section__login-text">Login / Sign Up</span>
                        </a>

                        <div class="menu-hamburguer" aria-label="Abrir menu">
                            <i class="fas fa-bars" aria-hidden="true"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <nav class="menu" aria-label="Menu lateral">
            <div class="sidebar-header">
                <h2>Menu</h2>
                <div class="close-sidebar" aria-label="Fechar menu">
                    <i class="fas fa-times" aria-hidden="true"></i>
                </div>
            </div>
            <ul>
                <li><a href="index.html">Página inicial</a></li>
                <li><a href="perfil.html">Perfil</a></li>
                <li><a href="rec.html">Como Reciclar?</a></li>
            </ul>
        </nav>
    </header>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            applyHeaderAuth({
                userSelector: '#userDisplay',
                logoutSelector: '#logoutBtn',
                loginLinkSelector: '.header-section__login-button',
                onLoggedOutRedirect: './login/login.html'
            });
        });
    </script>
    <script src="./assets/js/auth.js"></script>
