<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking de Reciclagem</title>
    <link rel="stylesheet" href="./assets/css/perfil.css">
</head>
<body>

    <script>
        document.addEventListener("DOMContentLoaded", async function () {
            try {
                const [headerRes, footerRes] = await Promise.all([
                    fetch('header.html'),
                    fetch('footer.html')
                ]);

                if (!headerRes.ok || !footerRes.ok) {
                    throw new Error("Erro ao carregar header ou footer.");
                }

                const [headerHTML, footerHTML] = await Promise.all([
                    headerRes.text(),
                    footerRes.text()
                ]);

                document.body.insertAdjacentHTML('afterbegin', headerHTML);
                document.body.insertAdjacentHTML('beforeend', footerHTML);

                initMenu();
            } catch (error) {
                console.error("Erro ao carregar o header/footer:", error);
            }
        });
    </script>

    <!-- Ranking geral -->
    <main class="ranking-section">
        <h1 class="ranking-title">🌍 Ranking de Reciclagem</h1>
        <table class="ranking-table">
            <thead>
                <tr>
                    <th>Posição</th>
                    <th>Avatar</th>
                    <th>Usuário</th>
                    <th>Total Reciclado</th>
                </tr>
            </thead>
            <tbody id="rankingBody">
                <tr>
                    <td>1</td>
                    <td><img src="https://avatars.dicebear.com/api/initials/AnaSouza.svg" class="ranking-avatar"></td>
                    <td>Ana Souza</td>
                    <td>820 kg</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><img src="https://avatars.dicebear.com/api/initials/JoaoPereira.svg" class="ranking-avatar"></td>
                    <td>João Pereira</td>
                    <td>750 kg</td>
                </tr>
                <tr>
                    <td>3</td>
                    <td><img src="https://avatars.dicebear.com/api/initials/MariaOliveira.svg" class="ranking-avatar"></td>
                    <td>Maria Oliveira</td>
                    <td>600 kg</td>
                </tr>
                <tr>
                    <td>4</td>
                    <td><img src="https://avatars.dicebear.com/api/initials/CarlosLima.svg" class="ranking-avatar"></td>
                    <td>Carlos Lima</td>
                    <td>470 kg</td>
                </tr>
                <tr class="highlight">
                    <td>5</td>
                    <td><img src="https://avatars.dicebear.com/api/initials/GabrielSantos.svg" class="ranking-avatar"></td>
                    <td>Gabriel Santos (Você)</td>
                    <td>325 kg</td>
                </tr>
            </tbody>
        </table>
    </main>

    <script src="./assets/js/menu.js" defer></script>
</body>
</html>
