<script>
    document.addEventListener("DOMContentLoaded", async function () {
        try {
            const [headerRes, footerRes] = await Promise.all([
                fetch('header.html'),
                fetch('footer.html')
            ]);

            if (!headerRes.ok || !footerRes.ok) {
                throw new Error("Erro ao carregar header ou footer.");
            }

            const [headerHTML, footerHTML] = await Promise.all([
                headerRes.text(),
                footerRes.text()
            ]);

            document.body.insertAdjacentHTML('afterbegin', headerHTML);
            document.body.insertAdjacentHTML('beforeend', footerHTML);

            initMenu();
        } catch (error) {
            console.error("Erro ao carregar o header/footer:", error);
        }
    });
</script>

            <script>
                (() => {
                    const layer = document.getElementById('dc-post-layer');
                    const trigger = document.getElementById('dc-post-trigger');
                    const form = document.getElementById('dc-post-form');
                    const qnt = document.getElementById('quantidade');
                    const mat = document.getElementById('material');
                    const foto = document.getElementById('foto');
                    const summary = document.getElementById('dc-summary');
                    const statusEl = document.getElementById('dc-status');
                    const cancelBtn = document.getElementById('dc-cancel');
                    const preview = document.getElementById('preview');

                    // Abre/fecha o layer
                    trigger.addEventListener('click', () => {
                        const expanded = trigger.getAttribute('aria-expanded') === 'true';
                        trigger.setAttribute('aria-expanded', String(!expanded));
                        layer.hidden = expanded;
                    });

                    cancelBtn.addEventListener('click', () => {
                        trigger.setAttribute('aria-expanded', 'false');
                        layer.hidden = true;
                        form.reset();
                        preview.innerHTML = '';
                        summary.textContent = '—';
                        statusEl.textContent = '';
                    });

                    // Preview & resumo dinâmico
                    function updateSummary() {
                        const m = mat.value || '—';
                        const v = Number(qnt.value || 0);
                        if (!v) { summary.textContent = '—'; return; }
                        const label = m === 'plastico' ? 'plásticos' :
                            m === 'papel' ? 'papéis' :
                                m === 'metal' ? 'metais' :
                                    m === 'vidro' ? 'vidros' :
                                        m === 'eletronicos' ? 'eletrônicos' : 'itens';
                        summary.textContent = `${v} ${label} = ${v} pontos.`;
                    }
                    mat.addEventListener('change', updateSummary);
                    qnt.addEventListener('input', updateSummary);

                    foto.addEventListener('change', () => {
                        preview.innerHTML = '';
                        const file = foto.files?.[0];
                        if (!file) return;
                        const img = document.createElement('img');
                        img.alt = 'Prévia da imagem selecionada';
                        img.src = URL.createObjectURL(file);
                        preview.appendChild(img);
                    });

                    // Submissão para o backend C# (multipart/form-data)
                    form.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        statusEl.textContent = '';
                        const material = mat.value;
                        const quantidade = Number(qnt.value);

                        if (!material) { statusEl.textContent = 'Selecione o material.'; return; }
                        if (!quantidade || quantidade < 1) { statusEl.textContent = 'Informe uma quantidade válida.'; return; }

                        const fd = new FormData();
                        fd.append('material', material);
                        fd.append('quantity', String(quantidade)); // backend espera "quantity"
                        // Se sua API também recebe "points", pode mandar, mas no seu backend quantity = points
                        // fd.append('points', String(quantidade));

                        if (foto.files && foto.files[0]) {
                            fd.append('image', foto.files[0], foto.files[0].name);
                        }

                        // Se você usa JWT, armazene antes em localStorage.setItem('dc_token', '...') após login
                        const token = localStorage.getItem('dc_token');

                        // Endpoint padrão do seu backend ASP.NET (ajuste se necessário)
                        const url = '/api/recycling/add';

                        try {
                            setLoading(true);
                            const resp = await fetch(url, {
                                method: 'POST',
                                headers: token ? { 'Authorization': `Bearer ${token}` } : undefined,
                                body: fd
                            });

                            if (!resp.ok) {
                                const msg = await safeText(resp);
                                throw new Error(msg || `Erro ${resp.status}`);
                            }

                            // sucesso
                            statusEl.textContent = 'Postado com sucesso! Pontos adicionados ao ranking.';

                            window.dispatchEvent(new CustomEvent('dc:recycling:posted', {
                                detail: { material, quantity: quantidade, points: quantidade }
                            }));

                            // reset suave
                            form.reset();
                            preview.innerHTML = '';
                            summary.textContent = '—';
                            setTimeout(() => {
                                trigger.setAttribute('aria-expanded', 'false');
                                layer.hidden = true;
                            }, 700);

                        } catch (err) {
                            statusEl.textContent = 'Falha ao enviar: ' + (err?.message || 'erro desconhecido');
                        } finally {
                            setLoading(false);
                        }
                    });

                    function setLoading(v) {
                        const btn = form.querySelector('.dc-btn:not(.ghost)');
                        if (!btn) return;
                        btn.disabled = v;
                        btn.textContent = v ? 'Enviando...' : 'Enviar';
                    }
                    async function safeText(r) {
                        try { return await r.text(); } catch { return ''; }
                    }
                })();
            </script>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const rankingBody = document.getElementById('rankingBody');
        const token = localStorage.getItem('dc_token');
        const auth = JSON.parse(localStorage.getItem('dc_auth_v1') || '{}');
        const currentUser = auth?.user?.username || '';

        if (!rankingBody) return;

        try {
            const res = await fetch('/api/auth/ranking', {
                headers: {
                    'Accept': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` })
                }
            });

            if (!res.ok) throw new Error('Erro ao buscar ranking');

            const data = await res.json();

            // Ordena por pontos (decrescente), e insere classe especial nos 3 primeiros
            data.sort((a, b) => b.points - a.points);

            rankingBody.innerHTML = ''; // limpa

            data.forEach((user, index) => {
                const pos = index + 1;
                const isCurrent = user.username === currentUser;

                const tr = document.createElement('tr');

                if (pos === 1) tr.className = 'first';
                else if (pos === 2) tr.className = 'second';
                else if (pos === 3) tr.className = 'third';
                else if (isCurrent) tr.className = 'highlight';

                const emoji = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : '';
                const label = isCurrent ? `${user.username} (Você)` : user.username;

                tr.innerHTML = `
                <td>${emoji ? emoji + ' ' : ''}${pos}</td>
                <td>${label}</td>
                <td>${user.points} kg</td>
            `;

                rankingBody.appendChild(tr);
            });

        } catch (err) {
            console.error('[ranking] Erro ao carregar:', err);
            rankingBody.innerHTML = '<tr><td colspan="3">Erro ao carregar ranking</td></tr>';
        }
    });
</script>

<script defer>
    (() => {
        // ===== util =====
        const sleep = (ms) => new Promise(r => setTimeout(r, ms));
        const waitFor = async (cond, { tries = 20, delay = 100 } = {}) => {
            while (tries-- > 0) { if (cond()) return true; await sleep(delay); }
            return false;
        };



        // ===== 2) Post Card (abre/fecha, preview e submit) =====
        function initPostCard() {
            const layer = document.getElementById('dc-post-layer');
            const trigger = document.getElementById('dc-post-trigger');
            const form = document.getElementById('dc-post-form');
            const qnt = document.getElementById('quantidade');
            const mat = document.getElementById('material');
            const foto = document.getElementById('foto');
            const summary = document.getElementById('dc-summary');
            const statusEl = document.getElementById('dc-status');
            const cancelBtn = document.getElementById('dc-cancel');
            const preview = document.getElementById('preview');

            if (!form || !trigger) return;

            // abre/fecha
            trigger.addEventListener('click', () => {
                const expanded = trigger.getAttribute('aria-expanded') === 'true';
                trigger.setAttribute('aria-expanded', String(!expanded));
                layer.hidden = expanded;
            });
            cancelBtn?.addEventListener('click', () => {
                trigger.setAttribute('aria-expanded', 'false');
                layer.hidden = true; form.reset(); preview.innerHTML = ''; summary.textContent = '—'; statusEl.textContent = '';
            });

            // resumo dinâmico
            const matLabel = (m) => m === 'plastico' ? 'plásticos' : m === 'papel' ? 'papéis' : m === 'metal' ? 'metais' : m === 'vidro' ? 'vidros' : m === 'eletronicos' ? 'eletrônicos' : 'itens';
            function updateSummary() {
                const m = mat.value || '—';
                const v = Number(qnt.value || 0);
                summary.textContent = v ? `${v} ${matLabel(m)} = ${v} pontos.` : '—';
            }
            mat.addEventListener('change', updateSummary);
            qnt.addEventListener('input', updateSummary);

            // preview
            foto?.addEventListener('change', () => {
                preview.innerHTML = '';
                const file = foto.files?.[0]; if (!file) return;
                const img = document.createElement('img');
                img.alt = 'Prévia da imagem selecionada'; img.src = URL.createObjectURL(file);
                preview.appendChild(img);
            });

            // submit
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                statusEl.textContent = '';
                const material = mat.value;
                const quantidade = Number(qnt.value);

                if (!material) { statusEl.textContent = 'Selecione o material.'; return; }
                if (!quantidade || quantidade < 1) { statusEl.textContent = 'Informe uma quantidade válida.'; return; }

                const fd = new FormData();
                fd.append('material', material);
                fd.append('quantity', String(quantidade)); // quantity = points no backend
                if (foto.files && foto.files[0]) fd.append('image', foto.files[0], foto.files[0].name);

                const token = localStorage.getItem('dc_token');
                const url = '/api/recycling/add';

                const btn = form.querySelector('.dc-btn:not(.ghost)');
                const setLoading = (v) => { if (btn) { btn.disabled = v; btn.textContent = v ? 'Enviando...' : 'Enviar'; } };

                try {
                    setLoading(true);
                    const resp = await fetch(url, { method: 'POST', headers: token ? { 'Authorization': `Bearer ${token}` } : undefined, body: fd });
                    if (!resp.ok) throw new Error(await resp.text() || `Erro ${resp.status}`);

                    let data = {}; try { data = await resp.json(); } catch { }
                    statusEl.textContent = 'Postado com sucesso! Pontos adicionados ao ranking.';

                    // evento global: métricas + feed
                    window.dispatchEvent(new CustomEvent('dc:recycling:posted', {
                        detail: {
                            id: data.id || crypto.randomUUID(),
                            material,
                            quantity: quantidade,
                            points: quantidade,
                            imageUrl: data.imageUrl || (foto.files?.[0] ? URL.createObjectURL(foto.files[0]) : null),
                            createdAt: data.createdAt || new Date().toISOString()
                        }
                    }));

                    // reset e fecha
                    form.reset(); preview.innerHTML = ''; summary.textContent = '—';
                    setTimeout(() => { trigger.setAttribute('aria-expanded', 'false'); layer.hidden = true; }, 600);
                } catch (err) {
                    statusEl.textContent = 'Falha ao enviar: ' + (err?.message || 'erro desconhecido');
                } finally {
                    setLoading(false);
                }
            });
        }

        // ===== 3) Feed (carrega anteriores e insere novos) =====
        function initFeed() {
            const feedEl = document.getElementById('feed');
            if (!feedEl) return;

            const loadPosts = () => { try { return JSON.parse(localStorage.getItem('dc_posts') || '[]'); } catch { return []; } };
            const savePosts = (arr) => { try { localStorage.setItem('dc_posts', JSON.stringify(arr)); } catch { } };

            const matPretty = (m) => m === 'plastico' ? 'Plástico' : m === 'papel' ? 'Papel' : m === 'metal' ? 'Metal' : m === 'vidro' ? 'Vidro' : m === 'eletronicos' ? 'Eletrônicos' : 'Material';

            function renderOne(p) {
                const el = document.createElement('article');
                el.className = 'dc-post';
                el.style = 'border:1px solid var(--line,#e5e7eb);border-radius:12px;padding:12px;display:grid;gap:8px;';
                const top = document.createElement('div');
                top.style = 'display:flex;justify-content:space-between;align-items:center;gap:8px;';
                const strong = document.createElement('strong');
                strong.textContent = `${p.quantity} ${matPretty(p.material)} • ${p.points} pts`;
                const when = document.createElement('span'); when.style = 'color:var(--muted,#6b7280);font-size:.9rem;'; when.textContent = new Date(p.createdAt).toLocaleString();
                top.append(strong, when);

                const mid = document.createElement('div'); mid.style = 'display:flex;gap:10px;align-items:center;flex-wrap:wrap;';
                if (p.imageUrl) { const img = document.createElement('img'); img.src = p.imageUrl; img.alt = 'Imagem da reciclagem'; img.style = 'width:88px;height:88px;object-fit:cover;border-radius:10px;border:1px solid var(--line,#e5e7eb);'; mid.appendChild(img); }
                const txt = document.createElement('p'); txt.style = 'margin:0;'; txt.textContent = `Postou ${p.points} ponto(s) com ${p.quantity} ${matPretty(p.material)}.`;
                mid.appendChild(txt);

                el.append(top, mid);
                feedEl.prepend(el);
            }

            function renderAll(list) {
                feedEl.setAttribute('aria-busy', 'true');
                feedEl.innerHTML = '';
                list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                list.forEach(renderOne);
                feedEl.setAttribute('aria-busy', 'false');
            }

            async function tryFetchPosts() {
                const token = localStorage.getItem('dc_token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const urls = ['/api/recycling/my', '/api/recycling/me', '/api/recycling/list?me=1'];
                for (const u of urls) {
                    try {
                        const r = await fetch(u, { headers });
                        if (!r.ok) continue;
                        const arr = await r.json();
                        if (Array.isArray(arr)) {
                            return arr.map(x => ({
                                id: x.id || crypto.randomUUID(),
                                material: x.material,
                                quantity: Number(x.quantity || 0),
                                points: Number(x.points ?? x.quantity ?? 0),
                                imageUrl: x.imageUrl || null,
                                createdAt: x.createdAt || x.date || new Date().toISOString()
                            }));
                        }
                    } catch { }
                }
                throw new Error('no backend');
            }

            // boot
            (async () => {
                try {
                    const api = await tryFetchPosts();
                    renderAll(api); savePosts(api);

                    window.dispatchEvent(new CustomEvent('dc:recycling:bootstrapped', {
                        detail: {
                            pontos: api.reduce((s, p) => s + (p.points || 0), 0),
                            itens: api.reduce((s, p) => s + (p.quantity || 0), 0),
                            posts: api.length
                        }
                    }));
                } catch {
                    renderAll(loadPosts());
                }
            })();

            // novo post
            window.addEventListener('dc:recycling:posted', (ev) => {
                const d = ev.detail || {};
                const post = {
                    id: d.id || crypto.randomUUID(),
                    material: d.material,
                    quantity: Number(d.quantity || 0),
                    points: Number(d.points ?? d.quantity ?? 0),
                    imageUrl: d.imageUrl || null,
                    createdAt: d.createdAt || new Date().toISOString()
                };
                renderOne(post);
                const all = [post, ...loadPosts()];
                savePosts(all);
            });
        }

        // ===== 4) Métricas (carrega e mantém em sincronia) =====
        function initMetrics() {
            const els = {
                pontos: document.getElementById('kPontos'),
                itens: document.getElementById('kItens'),
                posts: document.getElementById('kPosts')
            };
            const getNum = (el) => Number(String(el?.textContent || '0').replace(/\D+/g, '') || 0);
            const setNum = (el, v) => { if (el) el.textContent = String(v); };
            const render = (m) => { setNum(els.pontos, m.pontos || 0); setNum(els.itens, m.itens || 0); setNum(els.posts, m.posts || 0); };
            const save = (m) => { try { localStorage.setItem('dc_metrics', JSON.stringify(m)); } catch { } };
            const load = () => { try { return JSON.parse(localStorage.getItem('dc_metrics') || 'null'); } catch { return null; } };

            async function fromBackend() {
                const token = localStorage.getItem('dc_token');
                const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
                const endpoints = ['/api/recycling/summary', '/api/recycling/me/summary', '/api/recycling/metrics/me', '/api/recycling/my'];
                for (const url of endpoints) {
                    try {
                        const r = await fetch(url, { headers });
                        if (!r.ok) continue;
                        const data = await r.json();
                        if (Array.isArray(data)) {
                            const agg = data.reduce((a, e) => { const q = Number(e.quantity || 0); a.itens += q; a.pontos += Number(e.points ?? q); a.posts += 1; return a; }, { pontos: 0, itens: 0, posts: 0 });
                            return agg;
                        } else {
                            return {
                                pontos: Number(data.totalPoints ?? data.points ?? 0),
                                itens: Number(data.totalItems ?? data.items ?? 0),
                                posts: Number(data.totalPosts ?? data.posts ?? 0)
                            };
                        }
                    } catch { }
                }
                throw new Error('no metrics api');
            }

            (async () => {
                try { const m = await fromBackend(); render(m); save(m); }
                catch { const c = load(); render(c || { pontos: 0, itens: 0, posts: 0 }); }
            })();

            // atualiza em tempo real
            window.addEventListener('dc:recycling:posted', (ev) => {
                const d = ev.detail || {};
                const atual = { pontos: getNum(els.pontos), itens: getNum(els.itens), posts: getNum(els.posts) };
                const novo = { pontos: atual.pontos + Number(d.points ?? d.quantity ?? 0), itens: atual.itens + Number(d.quantity || 0), posts: atual.posts + 1 };
                render(novo); save(novo);
            });
            window.addEventListener('dc:recycling:bootstrapped', (ev) => {
                const d = ev.detail || {};
                const m = { pontos: Number(d.pontos || 0), itens: Number(d.itens || 0), posts: Number(d.posts || 0) };
                render(m); save(m);
            });
        }
    })();
</script>
