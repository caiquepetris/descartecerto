<script>
    document.addEventListener("DOMContentLoaded", async function () {
        try {
            const [headerRes, footerRes] = await Promise.all([
                fetch('header.html'),
                fetch('footer.html')
            ]);

            if (!headerRes.ok || !footerRes.ok) {
                throw new Error("Erro ao carregar header ou footer.");
            }

            const [headerHTML, footerHTML] = await Promise.all([
                headerRes.text(),
                footerRes.text()
            ]);

            document.body.insertAdjacentHTML('afterbegin', headerHTML);
            document.body.insertAdjacentHTML('beforeend', footerHTML);

            initMenu();
        } catch (error) {
            console.error("Erro ao carregar o header/footer:", error);
        }
    });
</script>
<div class="dc-wrap">
  
    <section class="dc-profile" aria-label="Perfil">
        <div class="dc-avatar" aria-hidden="true">DC</div>

        <div class="dc-name-row" aria-label="Nome e ações">
            <span class="dc-mini-icon" title="Perfil">

            </span>
            <h1 id="nomePerfil">Seu Nome</h1>
          
        </div>
    </section>

    <!-- Tabs -->
    <nav class="dc-tabs" role="tablist" aria-label="Navegação da página">  <button class="dc-tab" role="tab" aria-selected="true" data-tab="feed">Feed</button>  </nav>

    <!-- Grid principal -->
    <div class="dc-grid">
        <main id="tab-feed" role="tabpanel" aria-labelledby="feed" class="dc-tab-panel">
            
            <!-- Seção Publicar -->
            <section class="dc-card">
                <div class="dc-card__hd"><strong>Publicar</strong></div>
                <div class="dc-card__bd">
                    <form id="composer" class="dc-composer" novalidate>
                        <textarea id="textoInput"
                                  placeholder="Escreva um texto para acompanhar a foto..."
                                  aria-label="Texto do post"
                                  maxlength="280" rows="4"></textarea>

                        <div class="dc-composer__meta">
                            <span id="dcCharCount" aria-live="polite">280</span>
                        </div>

                        <div class="dc-actions">
                           
                            <input id="fotoInput" type="file" accept="image/*" hidden>

                            <label for="fotoInput" id="dcAttachBtn" class="dc-attach" title="Anexar imagem" aria-label="Anexar imagem">
                            
                                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                                    <path d="M21 12.5V7a5 5 0 0 0-10 0v9a3.5 3.5 0 0 0 7 0V8"
                                          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </label>

                            <button type="submit" id="publicarBtn" class="dc-btn dc-btn--primary">Publicar</button>
                        </div>
                    </form>

                </div>
            </section>

            <!-- Feed -->
            <section class="dc-card" style="margin-top:14px">
                <div class="dc-card__hd"><strong>Publicações</strong></div>
                <div class="dc-card__bd">
                    <div id="feed" class="dc-feed" aria-live="polite" aria-busy="false"></div>
                </div>
            </section>
        </main>


        <!-- Sidebar (à esquerda) -->
        <aside class="dc-sidebar">
            <div class="dc-sidebar__panel">
                <section class="dc-card" style="margin-top:14px">
                    <div class="dc-card__hd" style="text-align:center;">
                        <strong>Métricas</strong>
                    </div>
                    <div class="dc-card__bd" style="text-align:center;">
                        <div class="dc-kpi" style="justify-content:center;">
                            <div class="dc-kpi__k">
                                <div class="dc-kpi__v" id="kPontos">0</div>
                                <div class="dc-kpi__l">Pontos</div>
                            </div>
                            <div class="dc-kpi__k">
                                <div class="dc-kpi__v" id="kItens">0</div>
                                <div class="dc-kpi__l">Itens</div>
                            </div>
                            <div class="dc-kpi__k">
                                <div class="dc-kpi__v" id="kPosts">0</div>
                                <div class="dc-kpi__l">Posts</div>
                            </div>
                        </div>

                        <!-- Botão Ranking centralizado e mais largo -->
                        <div style="margin-top:14px; display:flex; justify-content:center;">
                            <a href="ranking.html" target="_blank" rel="noopener"
                               class="dc-btn dc-btn--primary"
                               style="height:36px; padding:0 20px; font-size:14px; font-weight:700;">
                                Ranking →
                            </a>
                        </div>
                    </div>
                </section>
            </div>
        </aside>
    </div>
</div>

<script>
    // Util
    const $ = (s, el = document) => el.querySelector(s);

    // Tabs
    const tabs = document.querySelectorAll('.dc-tab');
    tabs.forEach(t => {
        t.addEventListener('click', () => {
            tabs.forEach(x => x.setAttribute('aria-selected', 'false'));
            t.setAttribute('aria-selected', 'true');
            const id = t.dataset.tab;
            document.querySelectorAll('.dc-tab-panel').forEach(p => p.hidden = true);
            $('#tab-' + id).hidden = false;
        });
    });

    // Composer
    const feed = $('#feed');
    const form = $('#composer');
    const fotoInput = $('#fotoInput');
    const textoInput = $('#textoInput');
    const limparBtn = $('#limparBtn');
    const publicarBtn = $('#publicarBtn');

    const kPosts = $('#kPosts');
    const kPontos = $('#kPontos');
    const kItens = $('#kItens');

    function inc(el, n = 1) { el.textContent = (+el.textContent || 0) + n; }

    if (limparBtn && form) {
        limparBtn.addEventListener('click', () => { form.reset(); if (textoInput) textoInput.blur(); });
    }

    if (form) {
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const file = fotoInput && fotoInput.files && fotoInput.files[0];
            const text = (textoInput && textoInput.value || '').trim();
            if (!file && !text) { alert('Adicione uma imagem ou escreva um texto.'); return; }

            if (publicarBtn) publicarBtn.disabled = true;

            const addPostToFeed = (imgSrc) => {
                const when = new Date().toLocaleString('pt-BR');
                const post = document.createElement('article');
                post.className = 'dc-post';
                post.innerHTML = `
          <div class="dc-post__meta">
            <span class="dc-post__dot" aria-hidden="true"></span>
            <strong>Usuário</strong>
            <span style="margin-left:auto;opacity:.8">${when}</span>
          </div>
        `;

                if (imgSrc) {
                    const fig = document.createElement('figure');
                    fig.innerHTML = `
            <img src="${imgSrc}" alt="Imagem do post" />
            ${text ? `<figcaption>${escapeHTML(text)}</figcaption>` : ``}
          `;
                    post.appendChild(fig);
                } else {
                    const div = document.createElement('div');
                    div.style.padding = '12px 14px';
                    div.textContent = text;
                    post.appendChild(div);
                }

                if (feed) feed.prepend(post);
                if (form) form.reset();
                if (publicarBtn) publicarBtn.disabled = false;

                if (kPosts) inc(kPosts, 1);
                if (imgSrc) { if (kItens) inc(kItens, 1); if (kPontos) inc(kPontos, 1); }
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = () => addPostToFeed(reader.result);
                reader.onerror = () => { alert('Falha ao ler a imagem.'); if (publicarBtn) publicarBtn.disabled = false; };
                reader.readAsDataURL(file);
            } else {
                addPostToFeed(null);
            }
        });
    }

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }
</script>
</body>
<script src="./assets/js/menu.js" defer></script>
</html>
